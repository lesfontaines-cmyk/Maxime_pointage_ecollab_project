version: "3.8"

services:
  serveur:
    image: ghcr.io/lesfontaines-cmyk/pointage-serveur:latest
    build:
      context: ./Maxime_pointage_ecollab_serveur
      dockerfile: Dockerfile
    ports:
      - "${SERVEUR_PORT:-5000}:5000"
    environment:
      - PORT=5000
    restart: unless-stopped

  pwa:
    image: ghcr.io/lesfontaines-cmyk/pointage-pwa:latest
    build:
      context: ./Maxime_pointage_ecollab_pwa
      dockerfile: Dockerfile
    ports:
      - "${PWA_PORT:-80}:80"
    restart: unless-stopped
