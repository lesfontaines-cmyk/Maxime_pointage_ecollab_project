name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.PROJECT_PATH }} && git pull origin main && cd Maxime_pointage_ecollab_serveur && (curl -sS https://bootstrap.pypa.io/get-pip.py | python3 - --user --break-system-packages 2>&1 && python3 -m pip install --user --break-system-packages -r requirements.txt 2>&1 || echo WARN_PIP_FAILED); echo '=== DIAG ==='; whoami; echo '---'; ps -eo user,pid,args | grep '[g]unicorn'; echo '---'; cat /etc/systemd/system/pointage-serveur.service 2>/dev/null || echo 'no service file'; echo '---'; pkill -HUP -f '[g]unicorn' && echo 'SIGHUP_OK' || echo 'SIGHUP_FAIL'; echo '=== END ===';"
