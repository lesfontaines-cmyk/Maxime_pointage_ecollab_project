name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "CONTAINER=\$(docker ps -qf ancestor=pointage); echo '=== PUSH DIAG ==='; docker exec \$CONTAINER cat /app/vapid_keys.json 2>&1 || echo 'NO VAPID KEYS'; echo '---'; docker exec \$CONTAINER cat /app/push_subscriptions.json 2>&1 || echo 'NO SUBSCRIPTIONS'; echo '---'; docker exec \$CONTAINER python3 -c 'import sys; sys.path.insert(0,\"/app\"); from server import app, PUSH_AVAILABLE, VAPID_KEYS; print(\"PUSH_AVAILABLE:\", PUSH_AVAILABLE); print(\"VAPID pub:\", VAPID_KEYS[\"publicKey\"][:30] if VAPID_KEYS[\"publicKey\"] else \"EMPTY\")' 2>&1; echo '---'; docker logs \$CONTAINER --tail 30 2>&1; echo '=== END ===';"
