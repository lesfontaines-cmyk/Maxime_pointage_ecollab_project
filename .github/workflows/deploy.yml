name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "CONTAINER=\$(docker ps -qf ancestor=pointage); echo '=== DIAG ==='; echo 'Container:' \$CONTAINER; docker inspect \$CONTAINER --format '{{range .Mounts}}{{.Source}} -> {{.Destination}} ({{.Type}}){{println}}{{end}}' 2>&1; echo '---'; docker exec \$CONTAINER ls -la /app/server.py 2>&1 || docker exec \$CONTAINER find / -name server.py -maxdepth 4 2>/dev/null; echo '---'; docker exec \$CONTAINER head -5 /app/server.py 2>&1 || echo 'no /app/server.py'; echo '---'; docker exec \$CONTAINER python3 -c 'import pywebpush; print(\"pywebpush OK\")' 2>&1; echo '---'; docker exec \$CONTAINER grep -c 'push-status' /app/server.py 2>&1 || echo 'no push-status in server.py'; echo '---'; docker exec \$CONTAINER python3 -c 'import sys; print(sys.path)' 2>&1; echo '=== END ===';"
