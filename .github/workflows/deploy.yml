name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.PROJECT_PATH }} && git pull origin main && CONTAINER=\$(docker ps -qf ancestor=pointage) && docker cp Maxime_pointage_ecollab_serveur/requirements.txt \$CONTAINER:/tmp/requirements.txt && (docker exec \$CONTAINER pip install --break-system-packages -r /tmp/requirements.txt 2>&1 || echo WARN_PIP); docker restart \$CONTAINER"
